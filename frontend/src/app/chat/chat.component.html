<div class="chat-container">
  <div class="messages-list">
    
    <div *ngFor="let msg of messages; let msgIndex = index" 
         [ngClass]="{'ai-message': msg.isAi, 'user-message': !msg.isAi}">
      
      <markdown [data]="msg.text"></markdown>

      <div *ngIf="msg.smilesList && msg.smilesList.length > 0" class="molecule-container">
        <canvas *ngFor="let smile of msg.smilesList; let smileIndex = index"
                [id]="'smiles-canvas-' + msgIndex + '-' + smileIndex"
                class="molecule-canvas">
        </canvas>
      </div>

    </div>

    <div *ngIf="isLoading" class="loading-indicator">
      AI-ul analizează și calculează proprietățile...
    </div>

  </div>

  <div class="input-area">
    <input [(ngModel)]="userInput" (keyup.enter)="sendMessage()" placeholder="Scrie un prompt (ex: Proiectează o moleculă nouă)...">
    <button (click)="sendMessage()" [disabled]="isLoading">Trimite</button>
  </div>
</div>
